name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            binary: Cluster
            archive: cluster-linux-x86_64.tar.gz
          - name: macos
            os: macos-latest
            binary: Cluster
            archive: cluster-macos.tar.gz
          - name: windows-x86_64
            os: windows-latest
            binary: Cluster.exe
            archive: cluster-windows-x86_64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libxkbcommon-dev

      - name: Build
        run: cargo build --release

      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist/Cluster
          cp "target/release/${{ matrix.binary }}" dist/Cluster/
          cp README.md LICENSE dist/Cluster/
          tar -C dist -czf "${{ matrix.archive }}" Cluster

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/Cluster | Out-Null
          Copy-Item "target/release/${{ matrix.binary }}" dist/Cluster/
          Copy-Item README.md, LICENSE dist/Cluster/
          Compress-Archive -Path dist/Cluster -DestinationPath "${{ matrix.archive }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
