name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            archive: Cluster-linux-x86_64.tar.gz
          - name: macos-arm64
            os: macos-latest
            archive: Cluster-macos-arm64.tar.gz
          - name: windows-x86_64
            os: windows-latest
            archive: Cluster-windows-x86_64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.name }}
      - name: Verify
        run: cargo test --all-targets
      - name: Build
        run: cargo build --release
      - name: Package Linux
        if: runner.os == 'Linux'
        run: tar -czf "${{ matrix.archive }}" target/release/Cluster README.md LICENSE
      - name: Package macOS
        if: runner.os == 'macOS'
        run: tar -czf "${{ matrix.archive }}" target/release/Cluster README.md LICENSE
      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path target/release/Cluster.exe,README.md,LICENSE -DestinationPath "${{ matrix.archive }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Checksums and GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        working-directory: dist
        run: sha256sum Cluster-* > SHA256SUMS.txt
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/Cluster-*
            dist/SHA256SUMS.txt
